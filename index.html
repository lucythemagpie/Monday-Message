<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>D&D System</title>

<style>
html, body {
  margin: 0;
  height: 100%;
  overflow: hidden;
  font-family: Arial, sans-serif;
  background: #191919;
}

/* LAYOUT */
.view {
  display: none;
  position: absolute;
  inset: 0;
  align-items: center;
  justify-content: center;
  text-align: center;
}

/* TEXT */
#message {
  font-size: 7vw;
  font-weight: 900;
  color: white;
  letter-spacing: 0.1em;
}

#ominous {
  font-size: 5vw;
  color: #cfe7ff;
  letter-spacing: 0.5em;
  opacity: 0.7;
}

/* MONDAY GLOW + PULSE */
.mondayText {
  animation: pulseGlow 2.5s infinite;
  text-shadow:
    0 0 10px rgba(120,180,255,0.6),
    0 0 25px rgba(120,180,255,0.4),
    0 0 45px rgba(120,180,255,0.2);
}

@keyframes pulseGlow {
  0%,100% {
    transform: scale(1);
    filter: brightness(1);
  }
  50% {
    transform: scale(1.03);
    filter: brightness(1.3);
  }
}

/* SNOW */
.snowflake {
  position: absolute;
  top: -10px;
  color: white;
  pointer-events: none;
  animation: fall linear forwards;
  text-shadow: 0 0 6px rgba(180,220,255,0.8);
}

@keyframes fall {
  to { transform: translateY(110vh); }
}
</style>
</head>

<body>

<div id="message" class="view">IT'S D&D DAY, MOTHER HUBBARDS</div>
<div id="ominous" class="view">soon...</div>

<script>
const day = new Date().getDay();

const message = document.getElementById("message");
const ominous = document.getElementById("ominous");

function spawnSnow(isHeavy) {
  const s = document.createElement("div");
  s.className = "snowflake";

  // always SOME snowflake, sometimes chunky ❄
  const heavyFlake = Math.random() < (isHeavy ? 0.6 : 0.25);
  s.innerHTML = heavyFlake ? "❄" : "·";

  s.style.left = Math.random() * 100 + "vw";

  const size = isHeavy
    ? (10 + Math.random() * 26)
    : (6 + Math.random() * 16);

  s.style.fontSize = size + "px";

  const speed = isHeavy
    ? (1.2 + Math.random() * 2.5)   // FAST BLIZZARD
    : (2.5 + Math.random() * 5);    // light snow

  s.style.animationDuration = speed + "s";
  s.style.opacity = Math.random();

  document.body.appendChild(s);
  setTimeout(() => s.remove(), 9000);
}

/* reset */
message.style.display = "none";
ominous.style.display = "none";

let snowInterval;

if (day === 2) {
  message.style.display = "flex";
  message.classList.add("mondayText");

  // FAST BLIZZARD
  snowInterval = setInterval(() => spawnSnow(true), 18);

} else {
  ominous.style.display = "flex";

  // still snowing, just calmer
  snowInterval = setInterval(() => spawnSnow(false), 70);
}
</script>

</body>
</html>
