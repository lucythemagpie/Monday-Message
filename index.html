<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>D&D Day</title>

<style>
  body {
    margin: 0;
    background: transparent;
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  #message {
    display: none;
    font-size: 8vw;
    font-weight: 900;
    color: white;
    font-family: Arial, sans-serif;
    text-align: center;
  }
</style>
</head>

<body>

<div id="message">It's D&D day mother hubbards!</div>

<script>
  const today = new Date().getDay(); // Monday = 1
  if (today === 2) {
    document.getElementById("message").style.display = "block";
  }
</script>

</body>
</html>
